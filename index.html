<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI GENERATOR LOGIN - NARA STORE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        :root {
            --ai-pink: #ff4081;
            --ai-purple: #9c27b0;
            --dark-bg: #0d0d12;
        }

        body {
            background-color: var(--dark-bg);
            color: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle at center, rgba(255, 64, 129, 0.15), transparent);
        }

        .gen-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--ai-pink);
            border-radius: 30px;
            padding: 40px 30px;
            backdrop-filter: blur(15px);
            box-shadow: 0 0 40px rgba(255, 64, 129, 0.3);
            width: 95%;
            max-width: 450px;
            text-align: center;
        }

        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 4px solid var(--ai-pink);
            margin-bottom: 20px;
            box-shadow: 0 0 20px var(--ai-pink);
            object-fit: cover;
        }

        .email-box {
            background: #16161a;
            padding: 20px;
            border-radius: 15px;
            font-weight: 800;
            color: #00ff88;
            border: 1px solid #333;
            margin: 25px 0;
            font-size: 1.2rem;
            word-break: break-all;
        }

        .btn-gen {
            background: linear-gradient(45deg, var(--ai-pink), var(--ai-purple));
            border: none;
            color: white;
            font-weight: 800;
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            transition: 0.3s;
        }

        .btn-gen:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 64, 129, 0.4);
        }

        .btn-copy {
            background: transparent;
            border: 1px solid #444;
            color: #aaa;
            width: 100%;
            margin-top: 10px;
            padding: 10px;
            border-radius: 12px;
        }
    </style>
</head>
<body>

    <div class="gen-card">
        <img src="https://i.pinimg.com/736x/01/9b/6e/019b6e229712a20b005e8369324a3504.jpg" class="profile-img" alt="Ai Hoshino">
        
        <h3 class="fw-bold mb-1">Ai Hoshino Login</h3>
        <p class="text-secondary small">Generator Email Alight
